services:
  postgres:
    image: postgres:16-alpine
    container_name: aaryashop_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: aaryashop
      POSTGRES_USER: aaryauser
      POSTGRES_PASSWORD: aaryapass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aaryauser -d aaryashop"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: .
    container_name: aaryashop_server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://aaryauser:aaryapass@postgres:5432/aaryashop?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      OTP_EXPIRY_MINUTES: ${OTP_EXPIRY_MINUTES:-5}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-60}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
